# ============================================================
# CI 只做编译检查（不签名、不 Release）
# - PR 到 master/beta 时自动跑
# - push 到 master/beta 时自动跑（手动触发也行）
# ============================================================
name: CI Build Check

on:
  pull_request:
    branches: [ master, beta ]
  push:
    branches: [ master, beta ]
    paths:
      - 'app/src/**'
      - 'app/build.gradle.kts'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - 'gradle/wrapper/**'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          set -e
          export ANDROID_HOME=$RUNNER_TEMP/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLo cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          rm cmdline.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      # 提取 compose-bom 版本纳入 cache key → 降/升级依赖后自动清缓存
      - name: Extract compose-bom version
        id: bom
        run: |
          BOM_VERSION=$(grep -oP 'compose-bom:\K[^"]+' app/build.gradle.kts)
          echo "bom=$BOM_VERSION" >> $GITHUB_OUTPUT
          echo "compose-bom version: $BOM_VERSION"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-ci-${{ steps.bom.outputs.bom }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-ci-${{ steps.bom.outputs.bom }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace |
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Upload debug APK artifact (for manual testing)
        uses: actions/upload-artifact@v4
        with:
          name: openlist-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
