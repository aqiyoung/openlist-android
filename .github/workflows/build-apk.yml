name: Build & Release Android APK

on:
  push:
    branches: [ master, beta ]
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 release + 上传 asset

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉所有历史和 tags, 给 beta tag 递增用

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          set -e
          export ANDROID_HOME=$RUNNER_TEMP/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLo cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          rm cmdline.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Get version
        id: version
        run: |
          # 从 build.gradle.kts 读 versionName + versionCode (Synapse 套路是 pubspec.yaml, OpenList 是 gradle)
          VERSION_NAME=$(grep -E 'versionName\s*=\s*".*"' app/build.gradle.kts | head -1 | sed -E 's/.*versionName\s*=\s*"([^"]+)".*/\1/')
          VERSION_CODE=$(grep -E 'versionCode\s*=\s*[0-9]+' app/build.gradle.kts | head -1 | sed -E 's/.*versionCode\s*=\s*([0-9]+).*/\1/')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "versionName=$VERSION_NAME, versionCode=$VERSION_CODE"

      - name: Determine release tag
        id: tag
        run: |
          BASE_VERSION="${{ steps.version.outputs.version_name }}"
          SEMVER=$(echo '$BASE_VERSION' | sed 's/+.*//')

          # beta 分支 push → beta 版 (Pre-release)
          # main 分支 push 或 workflow_dispatch → 正式版 (Latest)
          IS_STABLE="true"
          if [ "${{ github.ref }}" = "refs/heads/beta" ] && [ "${{ github.event_name }}" = "push" ]; then
            IS_STABLE="false"
          fi

          if [ "$IS_STABLE" = "true" ]; then
            echo "tag=v$SEMVER" >> $GITHUB_OUTPUT
            echo "name=三页云盘 v$SEMVER" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
          else
            # Beta: 查找同版本已有的 beta tag, 自动递增 (Synapse 套路)
            LATEST_BETA=$(git tag -l "v${SEMVER}-beta.*" | sort -V | tail -1)
            if [ -z "$LATEST_BETA" ]; then
              BETA_NUM=1
            else
              BETA_NUM=$(echo '$LATEST_BETA' | grep -oP 'beta\.\K[0-9]+')
              BETA_NUM=$((BETA_NUM + 1))
            fi
            echo "tag=v${SEMVER}-beta.${BETA_NUM}" >> $GITHUB_OUTPUT
            echo "name=三页云盘 v${SEMVER}-beta.${BETA_NUM}" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Decode signing keystore
        run: |
          echo '${{ secrets.KEYSTORE_BASE64 }}' | base64 -d > app/openlist-release.jks
          cp app/openlist-release.jks openlist-release.jks
          ls -la openlist-release.jks app/openlist-release.jks

      - name: Cleanup keystore
        if: always()
        run: |
          rm -f openlist-release.jks app/openlist-release.jks
          rm -f app/android/key.properties

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK (signed)
        if: success()
        run: |
          set +e
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | tail -200
          echo "===exit=== exit=$?"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          KEYSTORE_FILE: openlist-release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Show full build log
        if: always()
        run: |
          if [ -f /tmp/build.log ]; then
            echo "==== /tmp/build.log (last 300 lines) ===="
            tail -300 /tmp/build.log
          fi

      - name: Rename APK
        if: success()
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/sanyun-${{ steps.tag.outputs.tag }}.apk
          ls -lh app/build/outputs/apk/release/

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: sanyun-${{ steps.tag.outputs.tag }}
          path: app/build/outputs/apk/release/sanyun-${{ steps.tag.outputs.tag }}.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/build.log
          retention-days: 7

      - name: Create GitHub Release
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          files: app/build/outputs/apk/release/sanyun-${{ steps.tag.outputs.tag }}.apk
          generate_release_notes: true
          prerelease: ${{ steps.tag.outputs.prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
