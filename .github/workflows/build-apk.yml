name: Build & Release Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write  # 允许创建 release + 上传 asset

jobs:
  build-release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          set -e
          export ANDROID_HOME=$RUNNER_TEMP/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLo cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          rm cmdline.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Decode signing keystore
        # 从 GitHub Secret (OPENLIST_KEYSTORE_BASE64) 还原 jks 文件
        run: |
          echo "${{ secrets.OPENLIST_KEYSTORE_BASE64 }}" | base64 -d > openlist-release.jks
          ls -la openlist-release.jks
          cp openlist-release.jks app/openlist-release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release APK (with signing)
        run: |
          set +e
          ./gradlew assembleRelease --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | tail -200
          echo "===exit=== exit=$?"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}
          OPENLIST_KEYSTORE_FILE: openlist-release.jks
          OPENLIST_KEYSTORE_PASS: ${{ secrets.OPENLIST_KEYSTORE_PASS }}
          OPENLIST_KEY_ALIAS: ${{ secrets.OPENLIST_KEY_ALIAS }}
          OPENLIST_KEY_PASS: ${{ secrets.OPENLIST_KEY_PASS }}

      - name: Show full build log
        if: always()
        run: |
          if [ -f /tmp/build.log ]; then
            echo "==== /tmp/build.log (last 300 lines) ===="
            tail -300 /tmp/build.log
          fi

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openlist-release-apk
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Extract version info
        if: success()
        id: meta
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          ls -la "$APK"
          APK_NAME=$(basename "$APK")
          APK_SIZE=$(stat -c%s "$APK")
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_name=$APK_NAME" >> $GITHUB_OUTPUT
          echo "apk_size=$APK_SIZE" >> $GITHUB_OUTPUT

      - name: Create GitHub Release (auto)
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.head_commit.message }}
          # 老板没指定版本号 - 用 commit message 第一行当 tag (push 自动)
          # 简化: 直接 push 创建 draft release, 不自动 publish
          name: "三页云盘 auto-build ${{ github.sha }}"
          body: |
            ## 三页云盘 自动构建
            - **commit**: ${{ github.sha }}
            - **build**: ${{ steps.meta.outputs.apk_size }} bytes
            - **APK**: ${{ steps.meta.outputs.apk_name }}
            - **workflow**: 老板改用自动构建 (2026-06-13 14:35)
          draft: true   # 老板手机测完再手动 publish
          prerelease: true
          files: |
            app/build/outputs/apk/release/*.apk
          # 失败也不阻塞 - 不管 release 创建成不成功, APK 都在 artifact 里
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-debug:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # 跟 release 并行跑, debug 给开发测试用

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK
        run: |
          set -e
          export ANDROID_HOME=$RUNNER_TEMP/android-sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -sSLo cmdline.zip https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          rm cmdline.zip
          export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" >/dev/null
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: |
          set +e
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee /tmp/build.log | tail -200
          echo "===exit=== exit=$?"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
          JAVA_HOME: ${{ env.JAVA_HOME_17_X64 }}

      - name: Show full build log
        if: always()
        run: |
          if [ -f /tmp/build.log ]; then
            echo "==== /tmp/build.log (last 300 lines) ===="
            tail -300 /tmp/build.log
          fi

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openlist-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-debug
          path: /tmp/build.log
          retention-days: 7
